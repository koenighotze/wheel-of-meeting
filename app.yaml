runtime: python39

handlers:
  - url: /data/(.+)
    static_files: data/\1
    upload: data/.*

  - url: /(app\.js|style\.css)
    static_files: src/\1
    upload: src/(app\.js|style\.css)

  - url: /
    static_files: src/index.html
    upload: src/index\.html

  - url: /.*
    static_files: src/index.html
    upload: src/index\.html
