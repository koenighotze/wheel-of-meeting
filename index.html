<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Meeting</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Wheel of Meeting</h1>
  </header>

  <main class="layout">
    <section class="wheel-section">
      <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
      </div>
      <button id="spin-btn" class="spin-button">Spin!</button>
    </section>

    <aside class="sidebar">
      <div class="dataset-tabs" id="dataset-tabs">
        <button class="tab-btn active" data-dataset="partners">Partners</button>
        <button class="tab-btn" data-dataset="lead-developers">Lead Developers</button>
      </div>

      <section class="partners-section">
        <h2 id="section-heading">Partners</h2>
        <ul id="partner-list" class="partner-list"></ul>
      </section>

      <section class="history-section">
        <h2>Recently Met</h2>
        <ul id="history-list" class="history-list"></ul>
      </section>

      <button id="clear-btn" class="clear-button">Clear All Data</button>
    </aside>
  </main>

  <dialog id="winner-dialog">
    <div class="dialog-content">
      <p class="dialog-label">Time to meet</p>
      <p id="winner-name" class="winner-name"></p>
      <p class="slots-label">Pick a meeting slot:</p>
      <div id="time-slots" class="time-slots"></div>
      <button id="dialog-close" class="dialog-skip">Skip</button>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
