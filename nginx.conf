server {
    listen ${PORT};

    # Data files are injected at runtime from GCP Secret Manager volumes.
    # Each secret is mounted at a separate path; these aliases map the
    # URLs the app expects to the actual mount locations.
    location = /data/partners.json {
        alias /run/secrets/partners/partners.json;
    }

    location = /data/lead-developers.json {
        alias /run/secrets/leads/lead-developers.json;
    }

    location / {
        root /app/src;
        try_files $uri /index.html;
    }
}
