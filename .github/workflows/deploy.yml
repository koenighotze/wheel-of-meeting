name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    env:
      IMAGE: ${{ secrets.GCP_AR_REPO }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: wheel-of-meeting
          image: ${{ env.IMAGE }}
          region: europe-west3
          service_account: ${{ secrets.CLOUD_RUN_SERVICE_ACCOUNT }}
          flags: '--no-allow-unauthenticated'

      - name: Show service URL
        run: |
          {
            echo "### Deployment complete"
            echo ""
            echo "**Service URL:** [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})"
          } >> "${GITHUB_STEP_SUMMARY}"
