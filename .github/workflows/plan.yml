name: Plan

on:
  push:
    paths:
      - 'infra/**'
      - '.github/workflows/plan.yml'
      - '.checkov.yaml'
      - '.tflint.hcl'
    branches: ['main']
    tags-ignore: ['**']
  workflow_dispatch:

concurrency:
  group: tf
  cancel-in-progress: true

env:
  TF_LOG: ${{ secrets.TF_LOG || 'INFO' }}
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_authorized_user_email: ${{ secrets.AUTHORIZED_USER_EMAIL }}
  TF_VAR_cloud_run_sa_email: ${{ secrets.CLOUD_RUN_SERVICE_ACCOUNT }}
  TF_IN_AUTOMATION: true
  TF_INPUT: false

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: infra

jobs:
  compliance-scan:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: '.'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12.3095.0

  lint:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - uses: terraform-linters/setup-tflint@v6
        name: Setting up TFLint
        with:
          tflint_version: v0.56.0
      - name: Initializing TFLint
        run: tflint --init
      - name: Linting
        run: tflint -f compact --disable-rule=terraform_module_pinned_source

  qa:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Authenticating
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setting up GCP environment
        uses: google-github-actions/setup-gcloud@v3.0.1
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
      - name: Terraform Format
        run: terraform fmt -check -recursive
      - name: Terraform Validate
        run: terraform validate -no-color

  plan:
    runs-on: ubuntu-24.04

    needs:
      - qa
      - lint
      - compliance-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Authenticating
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setting up GCP environment
        uses: google-github-actions/setup-gcloud@v3.0.1
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      - name: Init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
      - name: Plan
        run: terraform plan -no-color -out=tfplan
      - name: Show Terraform Plan as Summary
        run: |
          {
            echo "### Terraform Plan Output";
            echo "\`\`\`";
            terraform show -no-color tfplan;
            echo "\`\`\`";
          } > "${GITHUB_STEP_SUMMARY}"
